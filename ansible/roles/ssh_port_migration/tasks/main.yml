---
# =============================================================================
# Phase 1: SSH Port Migration (CRITICAL PATH)
# Purpose: Change SSH from port 22 to 2222 without losing access.
# Risk level: HIGH. This is where lockout happens.
#
# Strategy: Never remove port 22 until port 2222 is proven to work through
# an actual SSH connection test from the Ansible controller.
# =============================================================================

# -------------------------------------------------------------------------
# Step 1.0: Check if migration already completed (idempotent re-run)
# -------------------------------------------------------------------------
- name: Check if sshd is already listening on new port only
  ansible.builtin.command:
    cmd: ss -tlnp
  register: ssh_migration_port_check
  changed_when: false

- name: Skip migration if already on new port only
  ansible.builtin.set_fact:
    ssh_migration_already_done: >-
      {{ ((':' ~ ssh_port_new | string) in ssh_migration_port_check.stdout) and
         ((':' ~ ssh_port_old | string) not in ssh_migration_port_check.stdout) }}

- name: Update ansible_port if already migrated
  ansible.builtin.set_fact:
    ansible_port: "{{ ssh_port_new }}"
  when: ssh_migration_already_done | bool

- name: Log skip if already migrated
  ansible.builtin.debug:
    msg: "SSH port migration already complete. Port {{ ssh_port_new }} is active, port {{ ssh_port_old }} is closed."
  when: ssh_migration_already_done | bool

# -------------------------------------------------------------------------
# Step 1.1: Label port 2222 in SELinux (idempotent)
# -------------------------------------------------------------------------
- name: Check if port {{ ssh_port_new }} is already labeled for SSH in SELinux
  ansible.builtin.command:
    cmd: semanage port -l
  register: ssh_migration_selinux_ports
  changed_when: false
  when: not (ssh_migration_already_done | bool)

- name: Add SELinux label for SSH on port {{ ssh_port_new }}
  ansible.builtin.command:
    cmd: semanage port -a -t ssh_port_t -p tcp {{ ssh_port_new }}
  register: ssh_migration_selinux_add
  failed_when:
    - ssh_migration_selinux_add.rc != 0
    - "'already defined' not in ssh_migration_selinux_add.stderr"
  changed_when: ssh_migration_selinux_add.rc == 0
  when:
    - not (ssh_migration_already_done | bool)
    - "ssh_port_new | string not in ssh_migration_selinux_ports.stdout"

- name: Modify SELinux label if port exists with different type
  ansible.builtin.command:
    cmd: semanage port -m -t ssh_port_t -p tcp {{ ssh_port_new }}
  when:
    - not (ssh_migration_already_done | bool)
    - ssh_migration_selinux_add is defined
    - ssh_migration_selinux_add is failed
    - "'already defined' in (ssh_migration_selinux_add.stderr | default(''))"

# -------------------------------------------------------------------------
# Step 1.2: Configure dual-listen (port 22 + 2222)
# Uses block/rescue for rollback safety.
# -------------------------------------------------------------------------
- name: SSH port migration with rollback protection
  when: not (ssh_migration_already_done | bool)
  block:
    - name: Create sshd drop-in directory
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure sshd dual-listen (port {{ ssh_port_old }} + {{ ssh_port_new }})
      ansible.builtin.copy:
        content: |
          # Helix Stax SSH port migration - dual listen
          # This file is TEMPORARY. After verification, port {{ ssh_port_old }} is removed.
          Port {{ ssh_port_old }}
          Port {{ ssh_port_new }}
        dest: /etc/ssh/sshd_config.d/99-helix-port-migration.conf
        owner: root
        group: root
        mode: "0644"

    - name: Validate sshd configuration before restart
      ansible.builtin.command:
        cmd: sshd -t
      changed_when: false

    - name: Restart sshd with dual-listen configuration
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    # -------------------------------------------------------------------
    # Step 1.3: VERIFY port 2222 works from controller
    # -------------------------------------------------------------------
    - name: Wait for port {{ ssh_port_new }} to become available
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_port_new }}"
        timeout: "{{ ssh_port_verify_timeout }}"
        state: started
      delegate_to: localhost
      become: false

    - name: Verify SSH auth works on port {{ ssh_port_new }}
      ansible.builtin.command:
        cmd: whoami
      vars:
        ansible_port: "{{ ssh_port_new }}"
      register: ssh_migration_verify
      changed_when: false

    - name: Confirm verification succeeded
      ansible.builtin.assert:
        that:
          - ssh_migration_verify.rc == 0
        fail_msg: >-
          SSH verification on port {{ ssh_port_new }} failed.
          Rolling back to port {{ ssh_port_old }} only.

    # -------------------------------------------------------------------
    # Step 1.4: Remove port 22 (ONLY after successful verification)
    # -------------------------------------------------------------------
    - name: Switch to port {{ ssh_port_new }} only
      ansible.builtin.copy:
        content: |
          # Helix Stax SSH configuration
          # Port migration completed successfully
          Port {{ ssh_port_new }}
        dest: /etc/ssh/sshd_config.d/99-helix-port-migration.conf
        owner: root
        group: root
        mode: "0644"

    - name: Validate sshd configuration after port 22 removal
      ansible.builtin.command:
        cmd: sshd -t
      changed_when: false

    - name: Restart sshd on port {{ ssh_port_new }} only
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    # -------------------------------------------------------------------
    # Step 1.5: Update ansible_port for subsequent tasks
    # -------------------------------------------------------------------
    - name: Set ansible_port to {{ ssh_port_new }} for remaining playbook
      ansible.builtin.set_fact:
        ansible_port: "{{ ssh_port_new }}"

    - name: Update phase marker
      ansible.builtin.copy:
        content: |
          phase: 1-ssh-port-migration
          status: completed
          timestamp: {{ ansible_date_time.iso8601 }}
          ssh_port: {{ ssh_port_new }}
          selinux_port_labeled: true
        dest: "{{ helix_stax_config_dir }}/hardening-phase"
        owner: root
        group: root
        mode: "0644"
      vars:
        ansible_port: "{{ ssh_port_new }}"

  rescue:
    # -------------------------------------------------------------------
    # Step 1.F: ROLLBACK - revert to port 22 only
    # -------------------------------------------------------------------
    - name: "ROLLBACK: Remove dual-listen configuration"
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/99-helix-port-migration.conf
        state: absent

    - name: "ROLLBACK: Restart sshd on port {{ ssh_port_old }} only"
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: "ROLLBACK: Verify port {{ ssh_port_old }} is still accessible"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_port_old }}"
        timeout: "{{ ssh_port_verify_timeout }}"
        state: started
      delegate_to: localhost
      become: false

    - name: "ROLLBACK: Fail with clear message"
      ansible.builtin.fail:
        msg: >-
          SSH PORT MIGRATION FAILED. Rolled back to port {{ ssh_port_old }}.
          Server is still accessible on port {{ ssh_port_old }}.
          Investigate: Check SELinux labels (semanage port -l | grep ssh),
          firewall rules, and /var/log/secure for sshd errors.
          Hetzner console: https://console.hetzner.cloud/
