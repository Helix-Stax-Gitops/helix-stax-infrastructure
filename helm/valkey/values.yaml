# Valkey values for Helix Stax
# Chart: bitnami/valkey 5.4.9 (Valkey 9.0.3)
# Repo: https://charts.bitnami.com/bitnami
# Deploy via: helm install (Devtron chart store has bitnami indexed but POST install API not exposed)
# Namespace: database (co-located with CNPG)
#
# IMPORTANT: After helm install/upgrade, patch the ServiceMonitor to add release: monitoring label:
#   kubectl patch servicemonitor valkey -n database --type=merge -p '{"metadata":{"labels":{"release":"monitoring"}}}'
# The bitnami/valkey 5.4.9 chart template does NOT render metrics.serviceMonitor.labels into the object.

architecture: standalone  # Single instance — HA later when second DB node available

auth:
  enabled: true
  existingSecret: valkey-auth          # kubectl create secret generic valkey-auth -n database --from-literal=valkey-password=<STRONG_PASSWORD>
  existingSecretPasswordKey: valkey-password

primary:
  nodeSelector:
    workload: platform                 # Runs on heart (CP node)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: local-path
  # Network policy — restrict access to known namespaces
  networkPolicy:
    enabled: true
    allowExternal: false               # Only same-namespace pods by default

# Prometheus metrics via redis-exporter sidecar
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: database
    labels:
      release: monitoring              # Required for kube-prometheus-stack discovery
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

# Service configuration
service:
  type: ClusterIP
  ports:
    valkey: 6379
