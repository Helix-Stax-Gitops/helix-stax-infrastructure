name: Incident Report
description: Document a production incident for post-incident review
title: "[INCIDENT] "
labels: ["incident"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 (critical - full outage, data loss, security breach)
        - P2 (high - major degradation, significant user impact)
        - P3 (medium - partial degradation, workaround available)
        - P4 (low - minor impact, cosmetic)
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who and what was affected? Quantify if possible (e.g., all users, specific services, data at risk).
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: Chronological sequence of events
      placeholder: |
        - HH:MM UTC — Incident detected / alert fired
        - HH:MM UTC — On-call engaged
        - HH:MM UTC — Root cause identified
        - HH:MM UTC — Mitigation applied
        - HH:MM UTC — Service restored
        - HH:MM UTC — Incident closed
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: Root Cause
      description: What was the underlying cause? Use 5-Whys if helpful.
    validations:
      required: true

  - type: textarea
    id: resolution
    attributes:
      label: Resolution
      description: What was done to resolve the incident?
    validations:
      required: true

  - type: textarea
    id: action_items
    attributes:
      label: Action Items
      description: What follow-up work is needed to prevent recurrence?
      placeholder: |
        - [ ] Action item 1 — Owner — Due date
        - [ ] Action item 2 — Owner — Due date
